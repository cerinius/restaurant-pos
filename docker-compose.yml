services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-posuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pospassword}"
      POSTGRES_DB: "${POSTGRES_DB:-restaurant_pos}"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-posuser} -d ${POSTGRES_DB:-restaurant_pos}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pos_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pos_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    container_name: pos_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-posuser}:${POSTGRES_PASSWORD:-pospassword}@postgres:5432/${POSTGRES_DB:-restaurant_pos}?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS_ABCDEF}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-CHANGE_ME_REFRESH_MIN_32_CHARS_ABCDEF}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-12h}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      PORT: "3001"
      HOST: "0.0.0.0"
      NODE_ENV: "production"
      CORS_ORIGINS: "http://web:3000,http://localhost:3000,http://nginx:80,http://localhost"
    command: >
        sh -c "
        echo 'Running database migrations...' &&
        npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma &&
        echo 'Starting API server...' &&
        node apps/api/dist/apps/api/src/index.js
        "
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - api_logs:/app/logs
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3001}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}"
    container_name: pos_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3001}"
      NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}"
      NEXT_PUBLIC_DEMO_LOCATION_ID: "main-location"
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    networks:
      - pos_network
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local

networks:
  pos_network:
    driver: bridge