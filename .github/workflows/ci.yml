name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/db

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true  # Non-blocking for now, fix as part of hardening

  # ─── API Unit Tests ────────────────────────────────────────────────────────
  api-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/db

      - name: Run API unit tests
        working-directory: apps/api
        env:
          # Use stub values for tests that don't need real DB
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          JWT_SECRET: 'test-secret-for-ci-minimum-32-characters-long'
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/

  # ─── API Integration Tests (with real DB) ─────────────────────────────────
  api-integration:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: posuser
          POSTGRES_PASSWORD: pospassword
          POSTGRES_DB: restaurant_pos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/db

      - name: Run database migrations
        env:
          DATABASE_URL: 'postgresql://posuser:pospassword@localhost:5432/restaurant_pos_test'
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Run integration tests
        env:
          DATABASE_URL: 'postgresql://posuser:pospassword@localhost:5432/restaurant_pos_test'
          REDIS_URL: 'redis://localhost:6379'
          JWT_SECRET: 'test-jwt-secret-minimum-32-characters-long-abc'
          NODE_ENV: 'test'
        working-directory: apps/api
        run: npm test

  # ─── Build Docker Images ───────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, api-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: restaurant-pos-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: restaurant-pos-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://your-api.example.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Audit ────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (API)
        working-directory: apps/api
        run: npm audit --audit-level=high || true  # Report but don't fail yet

      - name: Run npm audit (Web)
        working-directory: apps/web
        run: npm audit --audit-level=high || true

      - name: Check for exposed secrets
        run: |
          # Fail if real Stripe live keys are committed
          if grep -r "sk_live_" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.env" .; then
            echo "ERROR: Live Stripe key found in source code!"
            exit 1
          fi
          echo "No live credentials found in source code"
